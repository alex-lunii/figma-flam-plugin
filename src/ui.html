<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, sans-serif;
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
      height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 22px;
      font-weight: 900;
      color: #E84B2A;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
      background: #2a2a2a;
      padding: 10px 12px;
      border-radius: 6px;
      border-left: 3px solid #444;
    }

    .hint.success {
      border-left-color: #4CAF50;
      color: #8BC34A;
    }

    .hint.error {
      border-left-color: #E84B2A;
      color: #ff8a80;
    }

    .hint.loading {
      border-left-color: #FFB300;
      color: #FFD54F;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #E84B2A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">FLAM</div>
      <div class="subtitle">Mockup Generator</div>
    </div>
  </div>

  <div class="hint" id="status">
    Sélectionne une frame sur le canvas, puis clique sur Générer.
  </div>

  <button id="btn" onclick="generate()">Générer le mockup</button>

  <script>
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");

    function generate() {
      btn.disabled = true;
      parent.postMessage({ pluginMessage: { type: "generate" } }, "*");
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === "loading") {
        status.className = "hint loading";
        status.textContent = "Génération en cours…";
      }

      if (msg.type === "success") {
        status.className = "hint success";
        status.textContent = `✓ Mockup créé : "${msg.name}"`;
        btn.disabled = false;
      }

      if (msg.type === "error") {
        status.className = "hint error";
        status.textContent = `Erreur : ${msg.message}`;
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
