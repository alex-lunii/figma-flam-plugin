<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, sans-serif;
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
      height: 280px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 22px;
      font-weight: 900;
      color: #E84B2A;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
      background: #2a2a2a;
      padding: 10px 12px;
      border-radius: 6px;
      border-left: 3px solid #444;
    }

    .hint.success {
      border-left-color: #4CAF50;
      color: #8BC34A;
    }

    .hint.error {
      border-left-color: #E84B2A;
      color: #ff8a80;
    }

    .hint.loading {
      border-left-color: #FFB300;
      color: #FFD54F;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-generate { background: #E84B2A; }
    #btn-export { background: #2a2a2a; border: 1px solid #444; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">FLAM</div>
      <div class="subtitle">Mockup Generator</div>
    </div>
  </div>

  <div class="hint" id="status">
    Sélectionne une frame sur le canvas, puis clique sur Générer.
  </div>

  <div class="actions">
    <button id="btn-generate" onclick="generate()">Générer le mockup</button>
    <button id="btn-export" onclick="exportZip()">Exporter tous les mockups (.zip)</button>
  </div>

  <script>
    const btnGenerate = document.getElementById("btn-generate");
    const btnExport = document.getElementById("btn-export");
    const status = document.getElementById("status");

    function setLoading(isLoading) {
      btnGenerate.disabled = isLoading;
      btnExport.disabled = isLoading;
    }

    function generate() {
      setLoading(true);
      parent.postMessage({ pluginMessage: { type: "generate" } }, "*");
    }

    function exportZip() {
      setLoading(true);
      status.className = "hint loading";
      status.textContent = "Recherche des mockups…";
      parent.postMessage({ pluginMessage: { type: "export" } }, "*");
    }

    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === "loading") {
        status.className = "hint loading";
        status.textContent = msg.total > 1
          ? `Génération de ${msg.total} mockups…`
          : "Génération en cours…";
      }

      if (msg.type === "progress") {
        status.className = "hint loading";
        status.textContent = `${msg.current} / ${msg.total} — ${msg.name}`;
      }

      if (msg.type === "exporting") {
        status.className = "hint loading";
        status.textContent = `Export de ${msg.total} mockup${msg.total > 1 ? "s" : ""} en cours…`;
      }

      if (msg.type === "success") {
        status.className = "hint success";
        status.textContent = msg.count > 1
          ? `✓ ${msg.count} mockups générés`
          : `✓ Mockup généré`;
        setLoading(false);
      }

      if (msg.type === "export-data") {
        try {
          const zip = new JSZip();
          for (const file of msg.files) {
            zip.file(file.name, new Uint8Array(file.data));
          }
          const blob = await zip.generateAsync({ type: "blob" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "flam-mockups.zip";
          a.click();
          URL.revokeObjectURL(url);
          status.className = "hint success";
          status.textContent = `✓ ${msg.files.length} mockup${msg.files.length > 1 ? "s" : ""} exporté${msg.files.length > 1 ? "s" : ""} dans flam-mockups.zip`;
        } catch (err) {
          status.className = "hint error";
          status.textContent = `Erreur ZIP : ${err.message}`;
        }
        setLoading(false);
      }

      if (msg.type === "error") {
        status.className = "hint error";
        status.textContent = `Erreur : ${msg.message}`;
        setLoading(false);
      }
    };
  </script>
</body>
</html>
